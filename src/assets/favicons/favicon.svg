<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="fav-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="fav-v" x1="28" y1="62" x2="100" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="60%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="fav-b" x1="24" y1="10" x2="100" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="28%" stop-color="#38BDF8"/>
      <stop offset="65%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="fav-rim" x1="24" y1="10" x2="56" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="fav-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="28" fill="url(#fav-bg)"/>
  <!-- Violet bottom ribbon (back) -->
  <path d="M28 86 C28 102 38 114 54 114 L74 114 C90 114 100 103 100 88 C100 74 92 66 76 60 L46 48"
    stroke="url(#fav-v)" stroke-width="22" stroke-linecap="round" fill="none"/>
  <!-- Blue top ribbon (front) -->
  <path d="M100 42 C100 26 90 14 74 14 L52 14 C36 14 26 26 26 42 C26 56 35 64 52 70 L82 80"
    stroke="url(#fav-b)" stroke-width="22" stroke-linecap="round" fill="none"/>
  <!-- Rim highlight -->
  <path d="M100 42 C100 26 90 14 74 14 L52 14 C36 14 26 26 26 42 C26 52 32 60 42 65"
    stroke="url(#fav-rim)" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Crossover glow -->
  <ellipse cx="64" cy="65" rx="3" ry="6" fill="white" opacity="0.85"
    transform="rotate(-28 64 65)" filter="url(#fav-glow)"/>
</svg>
