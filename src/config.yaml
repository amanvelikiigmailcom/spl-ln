site:
  name: Siplinx AI
  site: 'https://siplinx.com'
  base: '/'
  trailingSlash: true
  googleSiteVerificationId: ''

metadata:
  title:
    default: Siplinx AI - AI Meeting Notes That Stay Private
    template: '%s - Siplinx AI'
  description: 'Siplinx AI is your AI meeting companion. Get instant transcriptions, smart summaries, and action items - all processed locally on your device. 100% private.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Siplinx AI
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@siplinxai'
    site: '@siplinxai'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6
    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true
    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true
    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true
    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false
    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'system'
